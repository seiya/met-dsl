# algorithm section of spec.ir.yaml — sample of the correct format
#
# This file is a reference format showing, in a minimal 2-step form, the `algorithm:`
# section part of the spec.ir.yaml that the Compile phase outputs. It shows the
# structure required by the `workflow-compile-generate` / `workflow-compile-verify`
# skills (and the validate_pipeline_semantics --stage compile gate).
#
# This file is written as an excerpt of only the algorithm section; in an actual
# spec.ir.yaml, place this block as the value of the `algorithm:` key, alongside
# the `case` / `impl_defaults` / `io_contract` / `dependency` sections.
#
# Important: steps[].inputs and steps[].outputs must be a "list of non-empty strings".
#   OK: ["U_L", "U_R", "g"]
#   NG: [{name: U_L, source: U_L[0]}, ...]   ← object lists are forbidden
#
# Binding convention: each token appearing in steps[*].inputs/outputs must be
# traceable to one of:
#   - a direct input/output variable of controlled_spec.md (e.g. U_L, U_R, g), or
#   - an intermediate variable listed in temporaries (e.g. guard_pass), or
#   - a derived quantity defined in derived_field_rules.
# A name derived from component decomposition (e.g. h_L ← U_L[0]) becomes valid only
# once it is declared in temporaries.
# This sample does not perform decomposition and uses the input variable names of
# controlled_spec.md (U_L etc.) as-is.
#
# Do not include "2d"/"3d" in algorithm_id: the 2D/3D required contract of a problem-type node
#   (state_variables / required_update_paths / diagnostics_from_state=true) is
#   not shown in this sample. A contract example for a 2D problem will be added separately under docs/examples/.

algorithm_id: example_flux_compute
execution_mode: sequence

steps:
  - step_id: step_01_boundary_guard
    step_kind: boundary_apply
    operation_ref: input_guard
    # U_L / U_R / U_B / U_T are direct input variables of controlled_spec.md
    inputs: ["U_L", "U_R", "U_B", "U_T"]
    outputs: ["guard_pass"]

  - step_id: step_02_flux_compute
    step_kind: flux_compute
    operation_ref: rusanov_flux_2d
    # U_L / U_R are direct inputs of controlled_spec.md; g is the gravitational-acceleration parameter (same source)
    inputs: ["U_L", "U_R", "g"]
    outputs: ["F_h", "F_u", "F_v"]

ordering:
  - step_01_boundary_guard
  - step_02_flux_compute

control_condition: ""

iteration_contract: {}

# target_variables: the final variables that this component writes out (flux F_h/F_u/F_v)
update_semantics:
  target_variables: ["F_h", "F_u", "F_v"]
  update_order: sequential

# temporaries: intermediate variables that live only between steps (outside spec, outside target)
#
# spec/schema/plan/shape_expr.schema.json is the canonical source for the shape_expr notation rules.
# Only the following 3 allowed forms exist:
#   - "scalar" (case-insensitive)              … 0-dimensional
#   - "[d1, d2, ...]"  (bracket list form)     … e.g. "[3]", "[nx, ny]"
#   - "(d1, d2, ...)"  (paren tuple form)      … e.g. "(d1, d2)", "(nx, ny, nz)"
# Function-call notation (vector(N) / matrix(M,N) / tensor etc.) is rejected by the validator and causes a Compile fail.
temporaries:
  - name: guard_pass
    shape_expr: "scalar"
  # The following are reference examples of allowed multi-dimensional shape_expr forms (unused in this sample).
  # - name: flux_vec_example
  #   shape_expr: "[3]"            # OK: bracket list form
  # - name: state_grid_example
  #   shape_expr: "[nx, ny]"       # OK: 2-dimensional grid
  # - name: tensor_example
  #   shape_expr: "(d1, d2, d3)"   # OK: paren tuple form
  #
  # Forbidden examples (blocked by validate_pipeline_semantics):
  #   shape_expr: "vector(3)"      # NG: function-call notation → use "[3]"
  #   shape_expr: "matrix(3,3)"    # NG: same → use "[3, 3]"
  #   shape_expr: "tensor"         # NG: token outside the enumeration

derived_field_rules: []

invariants:
  - "F_h, F_u, F_v are defined wherever guard_pass is true"

splitting_policy:
  kind: none

# state_variables / required_update_paths / diagnostics_from_state=true are
# required fields for a problem-type node when spec_id contains "2d"/"3d".
# A component-type flux-compute component omits these.
diagnostics_from_state: false
fallback_policy: fail_closed
